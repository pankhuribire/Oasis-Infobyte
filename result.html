<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
    <div  align="center">
    <h2>Result</h2>
    <p id="output"></p>

    <button onclick="logout()">Logout</button> </div>
</div>
    <script>
        let score= localStorage.getItem("score");
        document.getElementById("output").innerText = "Your Score is: "+score;

        function logout(){
            window.location.href="index.html";
        }
    </script>


<p align="bottom">Note: Java program also generates result.txt file for result storage.</p>
</body>
</html>
